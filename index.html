<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Escape Room Secreto</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card" id="card">
      <div class="background-glow glow-one"></div>
      <div class="background-glow glow-two"></div>

      <div class="top-badge">
        <span aria-hidden="true">&#128477;</span>
        <small id="phaseBadge">Entrada</small>
      </div>

      <h1 id="title">Escape Room</h1>

      <p class="subtitle" id="subtitle">
        Clique em iniciar para entrar na primeira fase.
      </p>

      <div class="lock-wrapper" aria-hidden="true">
        <div class="lock" id="lock">
          <div class="shackle"></div>
          <div class="lock-body">
            <div class="shine"></div>
            <div class="keyhole"></div>
          </div>
        </div>
      </div>

      <form class="password-form hidden" id="passwordForm">
        <label for="passwordInput" id="passwordLabel">Digite a senha</label>
        <input
          id="passwordInput"
          name="password"
          type="text"
          autocomplete="off"
          inputmode="text"
          placeholder="Senha"
        />
        <button id="checkButton" class="check-button" type="submit">
          Desbloquear fase
        </button>
      </form>

      <button id="startButton" class="check-button" type="button">
        Iniciar escape room
      </button>

      <p id="message" class="message">
        Você está diante de uma sequência de portas trancadas.
      </p>

      <button id="resetButton" class="reset-button hidden" type="button">
        Jogar novamente
      </button>
    </section>
  </main>

  <div id="successModal" class="success-modal" aria-hidden="true">
    <div class="success-content">
      <div class="confetti" id="modalIcon">&#127881;</div>
      <h2 id="modalTitle">Parabéns!</h2>
      <div id="modalBody">
        <p>Você escapou de todas as fases.</p>
      </div>
      <button id="closeModal" type="button">Fechar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
